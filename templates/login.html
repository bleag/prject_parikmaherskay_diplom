<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход | StyleParic</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page">
<div class="auth-overlay"></div>

<div class="auth-container">
    <div class="auth-card">
        <!-- Кнопка назад -->
        <a href="/" class="back-home">
            <i class="fas fa-arrow-left"></i>
            <span>На главную</span>
        </a>

        <div class="auth-header">
            <div class="logo-icon">
                <i class="fas fa-scissors"></i>
            </div>
            <h1 class="auth-title">Добро пожаловать</h1>
            <p class="auth-subtitle">Войдите в свой аккаунт</p>
        </div>

        <form method="POST" action="/login" class="auth-form" id="loginForm">
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" placeholder="Логин" required autocomplete="username">
            </div>

            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" placeholder="Пароль" required autocomplete="current-password" id="password">
                <i class="fas fa-eye-slash toggle-password" onclick="togglePassword()"></i>
            </div>

            <button type="submit" class="auth-btn">
                <span>Войти</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <div class="auth-footer">
            <p>Нет аккаунта? <a href="/register">Зарегистрируйтесь</a></p>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.querySelector('.toggle-password');
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    }
}
</script>
</body>
</html>
