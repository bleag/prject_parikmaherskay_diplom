<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход | StyleParic</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    /* Дополнительные стили для фона */
    .auth-page {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        position: relative;
        font-family: 'Inter', sans-serif;
    }
    
    .auth-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url('/static/pp.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        z-index: 0;
    }
    
    /* Затемнение для читаемости текста */
    .auth-overlay::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
    }
    
    .auth-container {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }
    
    .auth-card {
        background: white;
        border-radius: 24px;
        padding: 40px;
        max-width: 450px;
        width: 100%;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }
    
    .back-home {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #8b5e3c;
        text-decoration: none;
        font-size: 14px;
        margin-bottom: 25px;
        transition: 0.3s;
    }
    
    .back-home:hover {
        color: #f5a623;
        transform: translateX(-3px);
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .logo-icon {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #f5a623 0%, #ff6b6b 100%);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 15px;
    }
    
    .logo-icon i {
        font-size: 30px;
        color: white;
    }
    
    .auth-title {
        font-size: 28px;
        color: #2d1810;
        margin-bottom: 8px;
    }
    
    .auth-subtitle {
        color: #8b5e3c;
        font-size: 14px;
    }
    
    .input-group {
        position: relative;
        margin-bottom: 20px;
    }
    
    .input-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #c4a47a;
        font-size: 16px;
    }
    
    .input-group input {
        width: 100%;
        padding: 14px 45px 14px 45px;
        border: 2px solid #f0e0d4;
        border-radius: 12px;
        font-size: 16px;
        transition: 0.3s;
        box-sizing: border-box;
    }
    
    .input-group input:focus {
        outline: none;
        border-color: #f5a623;
    }
    
    .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #c4a47a;
    }
    
    .auth-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #f5a623 0%, #ff6b6b 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: 0.3s;
        margin-top: 10px;
    }
    
    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(245, 166, 35, 0.3);
    }
    
    .error-message {
        background: #fee2e2;
        color: #dc2626;
        padding: 12px 15px;
        border-radius: 10px;
        margin-top: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid #f0e0d4;
    }
    
    .auth-footer a {
        color: #f5a623;
        text-decoration: none;
        font-weight: 600;
    }
    
    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body class="auth-page">
<div class="auth-overlay"></div>

<div class="auth-container">
    <div class="auth-card">
        <a href="/" class="back-home">
            <i class="fas fa-arrow-left"></i>
            <span>На главную</span>
        </a>

        <div class="auth-header">
            <div class="logo-icon">
                <i class="fas fa-scissors"></i>
            </div>
            <h1 class="auth-title">Добро пожаловать</h1>
            <p class="auth-subtitle">Войдите в свой аккаунт</p>
        </div>

        <form method="POST" action="/login" class="auth-form" id="loginForm">
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" placeholder="Логин" required autocomplete="username">
            </div>

            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" placeholder="Пароль" required autocomplete="current-password" id="password">
                <i class="fas fa-eye-slash toggle-password" onclick="togglePassword()"></i>
            </div>

            <button type="submit" class="auth-btn">
                <span>Войти</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <div class="auth-footer">
            <p>Нет аккаунта? <a href="/register">Зарегистрируйтесь</a></p>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.querySelector('.toggle-password');
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    }
}
</script>
</body>
</html>
