<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация | StyleParic</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    /* Дополнительные стили для фона */
    .auth-page {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        position: relative;
        font-family: 'Inter', sans-serif;
    }
    
    .auth-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url('/static/pp.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        z-index: 0;
    }
    
    /* Затемнение для читаемости текста */
    .auth-overlay::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
    }
    
    .auth-container {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }
    
    .auth-card {
        background: white;
        border-radius: 24px;
        padding: 40px;
        max-width: 450px;
        width: 100%;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }
    
    .back-home {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #8b5e3c;
        text-decoration: none;
        font-size: 14px;
        margin-bottom: 25px;
        transition: 0.3s;
    }
    
    .back-home:hover {
        color: #f5a623;
        transform: translateX(-3px);
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .logo-icon {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #f5a623 0%, #ff6b6b 100%);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 15px;
    }
    
    .logo-icon i {
        font-size: 30px;
        color: white;
    }
    
    .auth-title {
        font-size: 28px;
        color: #2d1810;
        margin-bottom: 8px;
    }
    
    .auth-subtitle {
        color: #8b5e3c;
        font-size: 14px;
    }
    
    .input-group {
        position: relative;
        margin-bottom: 20px;
    }
    
    .input-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #c4a47a;
        font-size: 16px;
    }
    
    .input-group input {
        width: 100%;
        padding: 14px 45px 14px 45px;
        border: 2px solid #f0e0d4;
        border-radius: 12px;
        font-size: 16px;
        transition: 0.3s;
        box-sizing: border-box;
    }
    
    .input-group input:focus {
        outline: none;
        border-color: #f5a623;
    }
    
    .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #c4a47a;
    }
    
    .password-requirements {
        background: #fef5ea;
        border-radius: 12px;
        padding: 15px;
        margin: 5px 0 15px;
    }
    
    .requirement {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        color: #8b5e3c;
        margin: 8px 0;
    }
    
    .requirement i {
        font-size: 10px;
        color: #c4a47a;
    }
    
    .requirement.valid i {
        color: #4caf50;
    }
    
    .requirement.valid {
        color: #4caf50;
    }
    
    .auth-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #f5a623 0%, #ff6b6b 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: 0.3s;
        margin-top: 10px;
    }
    
    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(245, 166, 35, 0.3);
    }
    
    .error-message {
        background: #fee2e2;
        color: #dc2626;
        padding: 12px 15px;
        border-radius: 10px;
        margin-top: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid #f0e0d4;
    }
    
    .auth-footer a {
        color: #f5a623;
        text-decoration: none;
        font-weight: 600;
    }
    
    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body class="auth-page">
<div class="auth-overlay"></div>

<div class="auth-container">
    <div class="auth-card">
        <!-- Кнопка назад -->
        <a href="/" class="back-home">
            <i class="fas fa-arrow-left"></i>
            <span>На главную</span>
        </a>

        <div class="auth-header">
            <div class="logo-icon">
                <i class="fas fa-spa"></i>
            </div>
            <h1 class="auth-title">Создать аккаунт</h1>
            <p class="auth-subtitle">Присоединяйтесь к StyleParic</p>
        </div>

        <form method="POST" class="auth-form" id="registerForm" onsubmit="return validatePassword()">
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" placeholder="Придумайте логин" required autocomplete="username" id="username">
            </div>

            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" placeholder="Придумайте пароль" required autocomplete="new-password" id="password">
                <i class="fas fa-eye-slash toggle-password" onclick="togglePassword()"></i>
            </div>

            <div class="password-requirements" id="passwordRequirements">
                <div class="requirement" id="lengthReq">
                    <i class="fas fa-circle"></i>
                    <span>Минимум 6 символов</span>
                </div>
                <div class="requirement" id="letterReq">
                    <i class="fas fa-circle"></i>
                    <span>Хотя бы одна буква</span>
                </div>
                <div class="requirement" id="numberReq">
                    <i class="fas fa-circle"></i>
                    <span>Хотя бы одна цифра</span>
                </div>
            </div>

            <button type="submit" class="auth-btn">
                <span>Зарегистрироваться</span>
                <i class="fas fa-user-plus"></i>
            </button>
        </form>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <div class="auth-footer">
            <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.querySelector('.toggle-password');
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    }
}

// Валидация пароля в реальном времени
const passwordInput = document.getElementById('password');
const lengthReq = document.getElementById('lengthReq');
const letterReq = document.getElementById('letterReq');
const numberReq = document.getElementById('numberReq');

passwordInput.addEventListener('input', function() {
    const password = this.value;
    
    if (password.length >= 6) {
        lengthReq.classList.add('valid');
        lengthReq.querySelector('i').className = 'fas fa-check-circle';
    } else {
        lengthReq.classList.remove('valid');
        lengthReq.querySelector('i').className = 'fas fa-circle';
    }
    
    if (/[a-zA-Zа-яА-Я]/.test(password)) {
        letterReq.classList.add('valid');
        letterReq.querySelector('i').className = 'fas fa-check-circle';
    } else {
        letterReq.classList.remove('valid');
        letterReq.querySelector('i').className = 'fas fa-circle';
    }
    
    if (/[0-9]/.test(password)) {
        numberReq.classList.add('valid');
        numberReq.querySelector('i').className = 'fas fa-check-circle';
    } else {
        numberReq.classList.remove('valid');
        numberReq.querySelector('i').className = 'fas fa-circle';
    }
});

function validatePassword() {
    const password = passwordInput.value;
    let errorMessage = '';
    
    if (password.length < 6) {
        errorMessage = 'Пароль должен содержать минимум 6 символов';
    } else if (!/[a-zA-Zа-яА-Я]/.test(password)) {
        errorMessage = 'Пароль должен содержать хотя бы одну букву';
    } else if (!/[0-9]/.test(password)) {
        errorMessage = 'Пароль должен содержать хотя бы одну цифру';
    }
    
    if (errorMessage) {
        let errorDiv = document.querySelector('.error-message');
        if (!errorDiv) {
            errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            const form = document.querySelector('.auth-form');
            form.insertBefore(errorDiv, form.querySelector('.auth-btn'));
        }
        errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i><span>${errorMessage}</span>`;
        errorDiv.style.display = 'flex';
        
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 3000);
        
        return false;
    }
    
    return true;
}
</script>
</body>
</html>
